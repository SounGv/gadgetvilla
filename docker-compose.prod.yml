services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data

  api:
    build: { context: ., dockerfile: docker/api.Dockerfile, target: prod }
    restart: always
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    expose: ["4000"]

  web:
    build: { context: ., dockerfile: docker/web.Dockerfile, target: prod }
    restart: always
    env_file: .env
    depends_on: [api]
    expose: ["3000"]

  nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [web, api]
    expose: ["80"]          # ไม่เปิดพอร์ตออกสู่ public — Cloudflare Tunnel ต่อให้

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on: [nginx]

volumes:
  pgdata:
  redisdata:
