# Render Blueprint — API (NestJS) บนแพลนฟรี (Node runtime — เชื่อถือได้บน free tier)
# ใช้: Render Dashboard → New → Blueprint → เลือก repo นี้ → วาง REDIS_URL (Upstash) เท่านั้น
# DATABASE_URL เชื่อมอัตโนมัติจาก Render Postgres ด้านล่าง

databases:
  - name: gadgetvilla-db
    plan: free
    region: singapore
    databaseName: gadgetvilla
    user: gadgetvilla

services:
  - type: web
    name: gadgetvilla-api
    runtime: node
    plan: free
    region: singapore
    # ใช้ npx pnpm (เลี่ยง corepack ที่เขียน /usr/bin ไม่ได้บน Render)
    buildCommand: npx --yes pnpm@9.12.0 install --no-frozen-lockfile --prod=false && npx --yes pnpm@9.12.0 --filter @gv/db generate && npx --yes pnpm@9.12.0 --filter @gv/api build
    # สร้าง/อัปเดตตารางจาก schema + seed master data (idempotent) แล้วสตาร์ท API
    startCommand: npx --yes pnpm@9.12.0 --filter @gv/db exec prisma db push --skip-generate --accept-data-loss && node apps/api/dist/main.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
      - key: PORT
        value: 4000
      # เชื่อมอัตโนมัติจาก Render Postgres (ไม่ต้องกรอกเอง)
      - key: DATABASE_URL
        fromDatabase:
          name: gadgetvilla-db
          property: connectionString
      # ต่อ Upstash (Redis) — วางค่าใน Render dashboard
      - key: REDIS_URL
        sync: false
      # สร้าง secret อัตโนมัติ
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      # URL ของเว็บ (Vercel) — ใส่หลัง deploy frontend เพื่อเปิด CORS
      - key: APP_URL
        sync: false
      # ค่า integration (ใส่เมื่อพร้อมใช้จริง)
      - key: PAYMENT_PROVIDER
        value: omise
      - key: OMISE_SECRET_KEY
        sync: false
      - key: OMISE_PUBLIC_KEY
        sync: false
      - key: OMISE_WEBHOOK_SECRET
        sync: false
      - key: BIGSELLER_API_KEY
        sync: false
      - key: TRCLOUD_API_KEY
        sync: false
      # Google OAuth (เข้าสู่ระบบด้วย Google) — สร้าง Client ID/Secret ใน Google Cloud Console
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://gadgetvilla-api.onrender.com/auth/google/callback
